<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E2EE WebRTC Client</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            padding: 20px;
        }
        h1 {
            font-size: 1.4em;
            margin-bottom: 16px;
            color: #f0f6fc;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            align-items: center;
        }
        button {
            padding: 8px 16px;
            border: 1px solid #30363d;
            border-radius: 6px;
            background: #21262d;
            color: #c9d1d9;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover:not(:disabled) { background: #30363d; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-danger { border-color: #f8514966; color: #f85149; }
        .btn-danger:hover:not(:disabled) { background: #f8514922; }
        .separator { width: 1px; height: 28px; background: #30363d; margin: 0 4px; }
        .status-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 16px;
            font-size: 13px;
            flex-wrap: wrap;
        }
        .status-item { display: flex; gap: 6px; align-items: center; }
        .status-label { color: #8b949e; }
        .status-on { color: #3fb950; font-weight: bold; }
        .status-off { color: #f85149; font-weight: bold; }
        .status-pending { color: #d29922; font-weight: bold; }
        .e2ee-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .e2ee-badge.status-on { background: rgba(63,185,80,0.15); border: 1px solid #3fb950; }
        .e2ee-badge.status-off { background: rgba(248,81,73,0.15); border: 1px solid #f85149; }
        .e2ee-badge.status-pending { background: rgba(210,153,34,0.15); border: 1px solid #d29922; }
        .media-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
        }
        .local-container, .remote-container {
            position: relative;
        }
        .local-container video {
            width: 200px;
            border-radius: 8px;
            border: 2px solid #30363d;
            background: #161b22;
        }
        .remote-container video {
            width: 480px;
            border-radius: 8px;
            border: 2px solid #30363d;
            background: #161b22;
        }
        .video-label {
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: rgba(0,0,0,0.7);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
        }
        #log {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 12px;
            font-family: 'Cascadia Code', 'Fira Code', monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
            color: #8b949e;
        }
        #log div { padding: 1px 0; }
        .shield-icon::before { content: "🛡️ "; }
    </style>
</head>
<body>
    <h1><span class="shield-icon"></span>E2EE WebRTC Client</h1>

    <div class="controls">
        <button id="btn-connect" onclick="connect()">Connect to SFU</button>
        <button id="btn-cam" onclick="startCamera()" disabled>Start Camera</button>
        <button id="btn-cam-simulcast" onclick="startCameraSimulcast()" disabled>Camera (Simulcast)</button>
        <button id="btn-mic" onclick="startMicrophone()" disabled>Start Mic</button>
        <button id="btn-rekey" onclick="triggerRekey()" disabled>Force Rekey</button>
        <span class="separator"></span>
        <button id="btn-stop-cam" onclick="stopCamera()" disabled class="btn-danger">Stop Camera</button>
        <button id="btn-stop-mic" onclick="stopMicrophone()" disabled class="btn-danger">Stop Mic</button>
        <button id="btn-disconnect" onclick="disconnect()" disabled class="btn-danger">Disconnect</button>
    </div>

    <div class="status-bar">
        <div class="status-item">
            <span class="status-label">E2EE:</span>
            <span id="e2ee-status" class="e2ee-badge status-off">OFF</span>
        </div>
        <div class="status-item">
            <span class="status-label">ICE:</span>
            <span id="ice-status">new</span>
        </div>
        <div class="status-item">
            <span class="status-label">DataChannel:</span>
            <span id="dc-status">closed</span>
        </div>
        <div class="status-item">
            <span class="status-label">Participants:</span>
            <span id="participant-count">0</span>
        </div>
        <div class="status-item">
            <span class="status-label">Epoch:</span>
            <span id="epoch-status">0</span>
        </div>
    </div>

    <div class="media-grid">
        <div class="local-container">
            <video id="local-preview" autoplay muted playsinline></video>
            <div class="video-label">Local</div>
        </div>
        <div id="media">
            <!-- Remote video elements inserted here -->
        </div>
    </div>

    <div id="log"></div>

    <script type="module" src="main.js"></script>
</body>
</html>
